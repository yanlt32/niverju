<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar Presença</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .radio-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .radio-card input[type="radio"] { position:absolute; opacity:0; width:0; }
    .radio-card label {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 18px 10px;
      border: 2px solid var(--border); border-radius: 14px;
      cursor: pointer; text-align: center;
      font-size: 12px; font-weight: 700; color: var(--text-mid);
      text-transform: uppercase; letter-spacing: 0.5px;
      transition: all 0.2s; background: var(--bg); line-height: 1.3;
    }
    .radio-card label .rc-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px; transition: all 0.2s;
    }
    .radio-card.yes label .rc-icon  { background: #E8FAF0; color: #009C3B; }
    .radio-card.no label .rc-icon   { background: #FDEDEC; color: var(--error); }
    .radio-card.maybe label .rc-icon { background: #FFF8E6; color: #C27D00; }

    .radio-card.yes input:checked + label   { border-color: #009C3B; background: #E8FAF0; color: #006A26; }
    .radio-card.no input:checked + label    { border-color: var(--error); background: #FDEDEC; color: var(--error); }
    .radio-card.maybe input:checked + label { border-color: #C27D00; background: #FFF8E6; color: #8A5500; }

    .radio-card.yes input:checked + label .rc-icon   { background: #009C3B; color: #fff; }
    .radio-card.no input:checked + label .rc-icon    { background: var(--error); color: #fff; }
    .radio-card.maybe input:checked + label .rc-icon { background: #C27D00; color: #fff; }

    .notice-box {
      background: #FFF8E6;
      border: 1px solid #F0C96A;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: #7A5A00;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    /* ── Guest search ── */
    .name-field-wrap { position: relative; }
    .guest-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 100;
      background: #fff; border: 1.5px solid var(--rose-light);
      border-radius: 14px; box-shadow: 0 8px 28px rgba(201,69,111,0.15);
      overflow: hidden; max-height: 280px; overflow-y: auto;
    }
    .guest-dropdown-header {
      padding: 9px 14px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-light); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }
    .guest-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; cursor: pointer; transition: background 0.12s;
      gap: 10px;
    }
    .guest-option:hover { background: #FFF0F4; }
    .go-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .go-group {
      font-size: 11px; color: var(--text-light);
      background: var(--bg); border-radius: 100px;
      padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .guest-option.selected { background: #FFF0F4; }
    .guest-option.selected .go-name { color: var(--rose-dark); }

    .name-hint {
      display: none; align-items: center; gap: 6px;
      font-size: 12px; margin-top: 7px; padding: 9px 12px;
      border-radius: 10px; font-weight: 500;
    }
    .name-hint.warn  { background: #FFF8E6; color: #8A5500; display: flex; }
    .name-hint.ok    { background: #E8FAF0; color: #1e6e40; display: flex; }
    .name-hint.notfound { background: #FFF8E6; color: #8A5500; display: flex; }

    /* ── Children section ── */
    .children-section {
      background: #EEF4FF; border: 1.5px solid #C5D9F5;
      border-radius: 14px; padding: 18px 20px; margin-top: 4px;
      animation: fadeSlide 0.2s ease;
    }
    @keyframes fadeSlide {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .children-section label { color:#2756A0; }
    .children-counter {
      display: flex; align-items: center; gap: 12px; margin-top: 10px;
    }
    .children-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: 2px solid #C5D9F5; background: #fff;
      font-size: 20px; font-weight: 700; color: #3B6FD4;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; line-height: 1;
    }
    .children-btn:hover { background: #3B6FD4; color: #fff; border-color: #3B6FD4; }
    .children-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .children-num {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 700; color: #3B6FD4;
      min-width: 40px; text-align: center; line-height: 1;
    }
    .children-text {
      font-size: 14px; color: #2756A0; font-weight: 500;
    }

    @media (max-width: 420px) {
      .radio-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page-header" style="padding-top:72px;padding-bottom:58px;">
  <a href="index.html" class="back-btn">
    <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
    Voltar
  </a>
  <h1>Confirmar Presença</h1>
  <p>Nos diga se você vai comparecer!</p>
</div>

<div class="container">

  <!-- Success -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon" id="successIcon">
      <i data-lucide="check-circle-2" style="width:40px;height:40px;color:var(--success);"></i>
    </div>
    <h2 id="successTitle">Confirmado!</h2>
    <p id="successMsg">Obrigado pela resposta.</p>
    <a href="presentes.html" class="btn btn-secondary" id="successGiftBtn" style="display:none;">
      <i data-lucide="gift" style="width:17px;height:17px;"></i>
      Escolher um presente agora
    </a>
    <div style="height:12px;"></div>
    <a href="index.html" class="btn btn-outline" style="color:var(--text-mid);border-color:var(--border);">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
      Voltar ao início
    </a>
  </div>

  <div class="card" id="formCard">

    <div class="alert alert-error" id="alertError">
      <i data-lucide="alert-circle" style="width:18px;height:18px;flex-shrink:0;"></i>
      <span id="errorMsg">Erro ao enviar.</span>
    </div>

    <form id="rsvpForm">

      <div class="form-group">
        <label for="name">Nome completo</label>
        <div class="name-field-wrap">
          <input type="text" id="name" name="name"
            placeholder="Digite seu nome para buscar na lista..."
            required autocomplete="off"
            oninput="onNameInput(this.value)"
            onblur="onNameBlur(this.value)"
            onfocus="onNameFocus()" />
          <div class="guest-dropdown" id="guestDropdown" style="display:none;"></div>
        </div>
        <div class="name-hint" id="nameHint"></div>
      </div>
      <input type="hidden" id="guestId" name="guestId" value="" />

      <div class="form-group">
        <label for="phone">WhatsApp</label>
        <input type="tel" id="phone" name="phone" placeholder="(11) 99999-9999" autocomplete="tel" required />
      </div>

      <div class="form-group">
        <label>Você vai comparecer?</label>
        <div class="radio-group">
          <div class="radio-card yes">
            <input type="radio" name="attending" id="att-yes" value="yes" />
            <label for="att-yes">
              <div class="rc-icon">
                <i data-lucide="check-circle-2" style="width:18px;height:18px;"></i>
              </div>
              Sim, vou!
            </label>
          </div>
          <div class="radio-card maybe">
            <input type="radio" name="attending" id="att-maybe" value="maybe" />
            <label for="att-maybe">
              <div class="rc-icon">
                <i data-lucide="help-circle" style="width:18px;height:18px;"></i>
              </div>
              Ainda não sei
            </label>
          </div>
          <div class="radio-card no">
            <input type="radio" name="attending" id="att-no" value="no" />
            <label for="att-no">
              <div class="rc-icon">
                <i data-lucide="x-circle" style="width:18px;height:18px;"></i>
              </div>
              Não vou poder
            </label>
          </div>
        </div>
      </div>

      <!-- Children section — shown when attending = yes or maybe -->
      <div id="childrenSection" style="display:none;" class="form-group">
        <div class="children-section">
          <label>Você virá com crianças?</label>
          <div class="children-counter">
            <button type="button" class="children-btn" id="childrenMinus" onclick="changeChildren(-1)" disabled>−</button>
            <span class="children-num" id="childrenNum">0</span>
            <button type="button" class="children-btn" onclick="changeChildren(1)">+</button>
            <span class="children-text" id="childrenText">nenhuma criança</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="message">
          Mensagem para a Juliana
          <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-light);font-size:12px;"> — opcional</span>
        </label>
        <textarea id="message" name="message" placeholder="Deixa um recadinho carinhoso..."></textarea>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        Confirmar
      </button>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-top">
      <i data-lucide="plane" style="width:14px;height:14px;transform:rotate(45deg);color:rgba(255,255,255,0.3);flex-shrink:0;"></i>
      <span class="footer-brand-name">Festa da Juliana</span>
    </div>
    <div class="footer-route">São Paulo, Brasil &rarr; Toronto, Canadá</div>
    <div class="footer-sep"></div>
    <div class="footer-credit">
      Desenvolvido por &nbsp;
      <a href="https://instagram.com/tortelliweb" target="_blank" rel="noopener" class="footer-insta">
        <i data-lucide="instagram" style="width:14px;height:14px;"></i>
        @tortelliweb
      </a>
    </div>
  </div>
</footer>

<script>
  lucide.createIcons();

  /* ── Guest search ── */
  let allGuests = [];
  let selectedGuestId = null;
  let dropdownOpen = false;

  fetch('/api/guests').then(r => r.json()).then(g => { allGuests = g; });

  /* ── Children counter ── */
  let childrenCount = 0;

  document.querySelectorAll('input[name="attending"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const val = radio.value;
      const sec = document.getElementById('childrenSection');
      if (val === 'yes' || val === 'maybe') {
        sec.style.display = 'block';
      } else {
        sec.style.display = 'none';
        childrenCount = 0;
        updateChildrenUI();
      }
    });
  });

  function changeChildren(delta) {
    childrenCount = Math.max(0, childrenCount + delta);
    updateChildrenUI();
  }

  function updateChildrenUI() {
    document.getElementById('childrenNum').textContent = childrenCount;
    document.getElementById('childrenMinus').disabled = childrenCount === 0;
    const texts = ['nenhuma criança', '1 criança', '2 crianças', '3 crianças', '4 crianças', '5 crianças'];
    document.getElementById('childrenText').textContent = texts[childrenCount] || `${childrenCount} crianças`;
  }

  function norm(s) {
    return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  function onNameInput(val) {
    selectedGuestId = null;
    document.getElementById('guestId').value = '';
    const hint = document.getElementById('nameHint');
    hint.className = 'name-hint';

    if (val.length < 2) { hideDropdown(); return; }

    const q = norm(val);
    const matches = allGuests.filter(g => norm(g.name).includes(q)).slice(0, 10);
    if (matches.length) showDropdown(matches);
    else hideDropdown();
  }

  function showDropdown(matches) {
    const dd = document.getElementById('guestDropdown');
    dd.innerHTML =
      `<div class="guest-dropdown-header"><i data-lucide="list" style="width:11px;height:11px;"></i> Selecione seu nome na lista</div>` +
      matches.map(g =>
        `<div class="guest-option" onmousedown="selectGuest('${g.id}','${g.name.replace(/'/g,"&#39;")}')">
           <span class="go-name">${g.name}</span>
         </div>`
      ).join('');
    dd.style.display = 'block';
    dropdownOpen = true;
    lucide.createIcons();
  }

  function hideDropdown() {
    document.getElementById('guestDropdown').style.display = 'none';
    dropdownOpen = false;
  }

  function selectGuest(id, name) {
    document.getElementById('name').value = name;
    selectedGuestId = id;
    document.getElementById('guestId').value = id;
    hideDropdown();
    const hint = document.getElementById('nameHint');
    hint.innerHTML = `<i data-lucide="check-circle-2" style="width:13px;height:13px;"></i> Encontrado na lista de convidados`;
    hint.className = 'name-hint ok';
    lucide.createIcons();
  }

  function onNameBlur(val) {
    setTimeout(() => {
      hideDropdown();
      if (!val.trim()) return;
      const hint = document.getElementById('nameHint');
      if (selectedGuestId) return; // already showing "ok"
      const parts = val.trim().split(/\s+/);
      if (parts.length < 2) {
        hint.innerHTML = `<i data-lucide="alert-triangle" style="width:13px;height:13px;"></i> Adicione o sobrenome para te identificarmos corretamente.`;
        hint.className = 'name-hint warn';
      } else {
        const q = norm(val);
        const found = allGuests.some(g => norm(g.name).includes(q.split(' ')[0]));
        if (!found) {
          hint.innerHTML = `<i data-lucide="alert-triangle" style="width:13px;height:13px;"></i> Nome não encontrado na lista. Verifique se foi convidado(a).`;
          hint.className = 'name-hint notfound';
        }
      }
      lucide.createIcons();
    }, 180);
  }

  function onNameFocus() {
    const val = document.getElementById('name').value;
    if (val.length >= 2) onNameInput(val);
  }

  document.getElementById('rsvpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('alertError');
    errEl.classList.remove('show');

    if (!form.phone.value.trim()) {
      document.getElementById('errorMsg').textContent = 'Informe seu WhatsApp para continuar.';
      errEl.classList.add('show');
      form.phone.focus();
      return;
    }

    const checkedRadio = document.querySelector('input[name="attending"]:checked');
    const attending = checkedRadio ? checkedRadio.value : '';
    if (!attending) {
      document.getElementById('errorMsg').textContent = 'Selecione uma das opções: Sim, Talvez ou Não.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando...';

    try {
      const res = await fetch('/api/rsvp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: form.name.value.trim(),
          phone: form.phone.value.trim(),
          attending,
          children: childrenCount,
          message: form.message.value.trim(),
          guestId: selectedGuestId || null
        })
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('errorMsg').textContent = data.error || 'Erro ao enviar.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Confirmar';
        return;
      }

      document.getElementById('formCard').style.display = 'none';
      const first = form.name.value.trim().split(' ')[0];
      const icon = document.getElementById('successIcon');
      const title = document.getElementById('successTitle');
      const msg = document.getElementById('successMsg');
      const giftBtn = document.getElementById('successGiftBtn');

      if (attending === 'yes') {
        icon.innerHTML = '<i data-lucide="party-popper" style="width:40px;height:40px;color:#009C3B;"></i>';
        title.textContent = 'Presença confirmada!';
        msg.textContent = `Que ótimo, ${first}! Mal podemos esperar para te ver lá.`;
        giftBtn.style.display = 'inline-flex';
      } else if (attending === 'maybe') {
        icon.innerHTML = '<i data-lucide="help-circle" style="width:40px;height:40px;color:#C27D00;"></i>';
        title.textContent = 'Recebemos sua resposta!';
        msg.textContent = `Tudo bem, ${first}! Quando souber, pode confirmar de novo com seu nome.`;
        giftBtn.style.display = 'inline-flex';
      } else {
        icon.innerHTML = '<i data-lucide="heart-handshake" style="width:40px;height:40px;color:var(--rose);"></i>';
        title.textContent = 'Que pena!';
        msg.textContent = `Obrigado por avisar, ${first}. A Juliana vai sentir sua falta.`;
      }

      document.getElementById('successScreen').classList.add('show');
      lucide.createIcons();
    } catch {
      document.getElementById('errorMsg').textContent = 'Erro de conexão. Verifique sua internet.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Confirmar';
    }
  });
</script>
</body>
</html>
